name: Windows Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and extract libmpv
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $repo = "shinchiro/mpv-winbuild-cmake"
          $apiUrl = "https://api.github.com/repos/$repo/releases/latest"
          $release = Invoke-RestMethod -Uri $apiUrl
          $asset = $release.assets | Where-Object { $_.name -like "mpv-dev-x86_64-*.7z" } | Select-Object -First 1
          if (-not $asset) { Write-Error "mpv-dev asset not found"; exit 1 }
          Write-Host "Downloading $($asset.name)..."
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile mpv-dev.7z
          if (Test-Path libmpv) { Remove-Item -Recurse -Force libmpv }
          & 7z x mpv-dev.7z -olibmpv -y
          # if headers ended up in a nested subdirectory, flatten it
          $nested = Get-ChildItem -Path libmpv -Directory | Where-Object { Test-Path "$($_.FullName)/include" }
          if ($nested) {
            Write-Host "Flattening nested directory: $($nested.Name)"
            Get-ChildItem -Path $nested.FullName | Move-Item -Destination libmpv -Force
            Remove-Item -Path $nested.FullName -Recurse -Force
          }

      - name: Verify libmpv structure
        shell: pwsh
        run: |
          Write-Host "--- libmpv contents ---"
          Get-ChildItem -Path libmpv -Recurse | ForEach-Object { Write-Host $_.FullName }
          if (-not (Test-Path "libmpv/include/mpv/client.h")) {
            Write-Error "libmpv/include/mpv/client.h not found!"
            exit 1
          }
          if (-not (Test-Path "libmpv/libmpv-2.dll")) {
            Write-Error "libmpv/libmpv-2.dll not found!"
            exit 1
          }
          Write-Host "Verification OK"

      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        run: cmake --build build --config Release

      - name: Package release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Copy-Item build/Release/FlowMediaPlayer.exe staging/
          Copy-Item libmpv/libmpv-2.dll staging/
          Compress-Archive -Path staging/* -DestinationPath FlowMediaPlayer-windows-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: FlowMediaPlayer-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
